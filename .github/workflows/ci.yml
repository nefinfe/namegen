name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check namegen tests
      - name: Type-check
        run: mypy namegen
      - name: Test
        run: pytest --cov=namegen --cov-report=term-missing
      - name: CLI smoke test
        run: |
          namegen --help
          namegen profiles list
          namegen generate --lang en --n 3 --seed 42
